name: Quality Gates (Advisory)

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality-gates-advisory:
    name: quality-gates-advisory
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NEXT_PUBLIC_SITE_URL: https://example.com
      BENCHMARK_ENABLE_LOCAL_FIXTURE: "1"
      BENCHMARK_SNAPSHOT_FIXTURE: sample
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run unit tests (advisory)
        id: unit
        run: |
          set +e
          pnpm test:unit
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run unit coverage (advisory)
        id: unit_coverage
        run: |
          set +e
          pnpm test:unit:coverage
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run fault-injection pilot (advisory)
        id: fault_injection
        run: |
          set +e
          mkdir -p .tmp/fault-injection
          pnpm test:fault-injection > .tmp/fault-injection/output.log 2>&1
          status=$?
          cat .tmp/fault-injection/output.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run mutation pilot (advisory)
        id: mutation
        run: |
          set +e
          mkdir -p .tmp/mutation
          pnpm test:mutation:pilot > .tmp/mutation/output.log 2>&1
          status=$?
          cat .tmp/mutation/output.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Summarize mutation report
        if: always()
        run: >
          node scripts/testing/summarize-mutation-report.mjs
          --report .tmp/mutation/report.json
          --baseline .github/mutation-baseline.json
          --summary-file "$GITHUB_STEP_SUMMARY"
          --out-json .tmp/mutation/summary.json

      - name: Run E2E tests (advisory)
        id: e2e
        run: |
          set +e
          pnpm test:e2e
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run visual tests (advisory)
        id: visual
        run: |
          set +e
          pnpm test:visual
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run Lighthouse CI (advisory)
        id: lhci
        run: |
          set +e
          pnpm lhci
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload quality-gate artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: quality-gates-artifacts
          path: |
            playwright-report/e2e/**
            playwright-report/visual/**
            test-results/e2e/**
            test-results/visual/**
            .tmp/lhci/**
            coverage/**
            .tmp/fault-injection/**
            .tmp/mutation/**
          if-no-files-found: warn

      - name: Publish advisory summary
        if: always()
        run: |
          unit_status="${{ steps.unit.outputs.status }}"
          unit_coverage_status="${{ steps.unit_coverage.outputs.status }}"
          fault_injection_status="${{ steps.fault_injection.outputs.status }}"
          mutation_status="${{ steps.mutation.outputs.status }}"
          e2e_status="${{ steps.e2e.outputs.status }}"
          visual_status="${{ steps.visual.outputs.status }}"
          lhci_status="${{ steps.lhci.outputs.status }}"

          format_status() {
            if [ "$1" = "0" ]; then
              echo "PASS"
            else
              echo "ADVISORY_FAIL"
            fi
          }

          {
            echo "## Advisory Quality Gates"
            echo ""
            echo "| Gate | Exit Code | Result |"
            echo "| --- | ---: | --- |"
            echo "| Vitest unit | ${unit_status:-unknown} | $(format_status "${unit_status:-1}") |"
            echo "| Vitest coverage | ${unit_coverage_status:-unknown} | $(format_status "${unit_coverage_status:-1}") |"
            echo "| Fault-injection pilot | ${fault_injection_status:-unknown} | $(format_status "${fault_injection_status:-1}") |"
            echo "| Mutation pilot | ${mutation_status:-unknown} | $(format_status "${mutation_status:-1}") |"
            echo "| Playwright e2e | ${e2e_status:-unknown} | $(format_status "${e2e_status:-1}") |"
            echo "| Playwright visual | ${visual_status:-unknown} | $(format_status "${visual_status:-1}") |"
            echo "| Lighthouse CI | ${lhci_status:-unknown} | $(format_status "${lhci_status:-1}") |"
            echo ""
            echo "This workflow is advisory in Phase 3 and does not block merges."
          } >> "$GITHUB_STEP_SUMMARY"
